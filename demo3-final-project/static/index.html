<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RAG Feed</title>
<style>
  :root {
    --bg: #f6f7f9; --card: #ffffff; --ink: #1c2733; --muted: #67727e;
    --accent: #2a78d6; --border: #e3e6ea;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Segoe UI", sans-serif; font-size: 15px; background: var(--bg); color: var(--ink); }
  header { background: var(--card); border-bottom: 1px solid var(--border); }
  .wrap { max-width: 680px; margin: 0 auto; padding: 0 16px; }
  h1 { font-size: 20px; margin: 0; padding: 14px 0 0; }
  nav { display: flex; gap: 4px; margin-top: 10px; }
  nav button {
    border: none; background: none; padding: 10px 16px; font-size: 15px;
    color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
  }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  main { padding: 20px 0 60px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
  textarea, input[type=text] {
    width: 100%; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; font: inherit; resize: vertical;
  }
  .row { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
  .btn {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 9px 18px; font-size: 15px; cursor: pointer;
  }
  .btn:disabled { opacity: .5; cursor: default; }
  .post-content { white-space: pre-wrap; margin-bottom: 8px; }
  .meta { font-size: 12px; color: var(--muted); }
  .vector {
    font-family: ui-monospace, monospace; font-size: 12px; color: var(--muted);
    background: var(--bg); border-radius: 6px; padding: 6px 8px; margin-top: 8px;
    cursor: pointer; word-break: break-all; max-height: 3.2em; overflow: hidden;
  }
  .vector.open { max-height: none; }
  #chat-log { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #fff; }
  .msg.assistant { align-self: flex-start; background: var(--card); border: 1px solid var(--border); }
  .chips { align-self: flex-start; font-size: 12px; color: var(--muted); }
  .chips span { background: #e8f0fb; color: var(--accent); border-radius: 999px; padding: 2px 10px; margin-right: 4px; }
  .hidden { display: none; }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>RAG Feed — personal knowledge base</h1>
    <nav>
      <button id="tab-feed" class="active">Feed</button>
      <button id="tab-chat">Chat</button>
    </nav>
  </div>
</header>

<main class="wrap">
  <section id="feed">
    <div class="card">
      <textarea id="post-text" rows="3" placeholder="What's on your mind? It will be embedded and stored."></textarea>
      <div class="row"><button class="btn" id="post-btn">Post</button></div>
    </div>
    <div id="posts"></div>
  </section>

  <section id="chat" class="hidden">
    <div id="chat-log"></div>
    <div class="card">
      <input type="text" id="chat-text" placeholder="Ask something about your posts…">
      <div class="row"><button class="btn" id="chat-btn">Send</button></div>
    </div>
  </section>
</main>

<script>
const $ = (id) => document.getElementById(id);

// ---- tabs ----
function show(tab) {
  $("feed").classList.toggle("hidden", tab !== "feed");
  $("chat").classList.toggle("hidden", tab !== "chat");
  $("tab-feed").classList.toggle("active", tab === "feed");
  $("tab-chat").classList.toggle("active", tab === "chat");
}
$("tab-feed").onclick = () => show("feed");
$("tab-chat").onclick = () => show("chat");

// ---- feed ----
function vectorPreview(embText) {
  const dims = embText.slice(1, -1).split(",");
  return `[${dims.slice(0, 8).map(Number).map(n => n.toFixed(4)).join(", ")}, …] · ${dims.length} dims`;
}

function renderPost(p) {
  const div = document.createElement("div");
  div.className = "card";
  const content = document.createElement("div");
  content.className = "post-content";
  content.textContent = p.content;
  const meta = document.createElement("div");
  meta.className = "meta";
  meta.textContent = new Date(p.created_at).toLocaleString();
  const vec = document.createElement("div");
  vec.className = "vector";
  vec.textContent = vectorPreview(p.embedding);
  vec.title = "Click to expand full vector";
  vec.onclick = () => {
    vec.classList.toggle("open");
    vec.textContent = vec.classList.contains("open") ? p.embedding : vectorPreview(p.embedding);
  };
  div.append(content, meta, vec);
  return div;
}

async function loadPosts() {
  const posts = await (await fetch("/api/posts")).json();
  const box = $("posts");
  box.replaceChildren(...posts.map(renderPost));
}

$("post-btn").onclick = async () => {
  const text = $("post-text").value.trim();
  if (!text) return;
  $("post-btn").disabled = true;
  await fetch("/api/posts", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ content: text }),
  });
  $("post-text").value = "";
  $("post-btn").disabled = false;
  loadPosts();
};

loadPosts();

// ---- chat ----
const history = [];  // [{role, content}] plain-text history sent to the server

function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  $("chat-log").appendChild(div);
  div.scrollIntoView();
  return div;
}

$("chat-btn").onclick = sendChat;
$("chat-text").addEventListener("keydown", (e) => { if (e.key === "Enter") sendChat(); });

async function sendChat() {
  const text = $("chat-text").value.trim();
  if (!text) return;
  $("chat-text").value = "";
  $("chat-btn").disabled = true;
  history.push({ role: "user", content: text });
  addMsg("user", text);
  const thinking = addMsg("assistant", "…");
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history }),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    thinking.remove();
    if (data.searches.length) {
      const chips = document.createElement("div");
      chips.className = "chips";
      chips.append("searched: ");
      data.searches.forEach(q => {
        const s = document.createElement("span");
        s.textContent = q;
        chips.appendChild(s);
      });
      $("chat-log").appendChild(chips);
    }
    addMsg("assistant", data.reply);
    history.push({ role: "assistant", content: data.reply });
  } catch (err) {
    thinking.textContent = "Error: " + err.message;
    history.pop();
  } finally {
    $("chat-btn").disabled = false;
  }
}
</script>
</body>
</html>
